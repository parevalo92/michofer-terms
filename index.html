<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiChofer | Legal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="legal.css" />
</head>

<body>
  <div class="cursor-glow"></div>

  <div class="legal-lang-switch">
    <button class="lang-btn active" data-language="es">ES</button>
    <button class="lang-btn" data-language="en">EN</button>
  </div>

  <main class="legal-page">
    <section class="legal-hero">
      <div class="hero-bg-orb orb-1"></div>
      <div class="hero-bg-orb orb-2"></div>
      <div class="hero-grid"></div>

      <div class="container legal-hero-content reveal">
        <span class="eyebrow" data-section="hero" data-value="eyebrow"></span>
        <h1 class="legal-title" data-section="hero" data-value="title"></h1>
        <p class="legal-subtitle" data-section="hero" data-value="subtitle"></p>

        <div class="legal-badges">
          <span data-section="hero" data-value="badge-1"></span>
          <span data-section="hero" data-value="badge-2"></span>
          <span data-section="hero" data-value="badge-3"></span>
          <span data-section="hero" data-value="badge-4"></span>
        </div>
      </div>
    </section>

    <section class="legal-content section-space">
      <div class="container legal-layout">

        <aside class="legal-sidebar glass reveal">
          <h3 data-section="sidebar" data-value="title"></h3>
          <a href="#contrato-usuarios" data-section="sidebar" data-value="users"></a>
          <a href="#contrato-conductores" data-section="sidebar" data-value="drivers"></a>
          <a href="#reglas" data-section="sidebar" data-value="rules"></a>
          <a href="#politicas" data-section="sidebar" data-value="policies"></a>
          <a href="#privacidad" data-section="sidebar" data-value="privacy"></a>
          <a href="#cookies" data-section="sidebar" data-value="cookies"></a>
          <a href="#aceptacion" data-section="sidebar" data-value="acceptance"></a>
          <a href="#ley" data-section="sidebar" data-value="law"></a>
        </aside>

        <div class="legal-docs">

          <article class="legal-card glass reveal" id="contrato-usuarios">
            <span class="doc-label" data-section="usersContract" data-value="label"></span>
            <h2 data-section="usersContract" data-value="title"></h2>
            <p data-section="usersContract" data-value="intro"></p>

            <h3 data-section="usersContract" data-value="objectTitle"></h3>
            <p data-section="usersContract" data-value="objectText"></p>

            <h3 data-section="usersContract" data-value="requirementsTitle"></h3>
            <ul>
              <li data-section="usersContract" data-value="req1"></li>
              <li data-section="usersContract" data-value="req2"></li>
              <li data-section="usersContract" data-value="req3"></li>
              <li data-section="usersContract" data-value="req4"></li>
              <li data-section="usersContract" data-value="req5"></li>
            </ul>

            <h3 data-section="usersContract" data-value="servicesTitle"></h3>
            <p data-section="usersContract" data-value="servicesText"></p>

            <h3 data-section="usersContract" data-value="paymentsTitle"></h3>
            <p data-section="usersContract" data-value="paymentsText"></p>
          </article>

          <article class="legal-card glass reveal" id="contrato-conductores">
            <span class="doc-label" data-section="driversContract" data-value="label"></span>
            <h2 data-section="driversContract" data-value="title"></h2>
            <p data-section="driversContract" data-value="intro"></p>

            <h3 data-section="driversContract" data-value="relationTitle"></h3>
            <p data-section="driversContract" data-value="relationText"></p>

            <h3 data-section="driversContract" data-value="requirementsTitle"></h3>
            <ul>
              <li data-section="driversContract" data-value="req1"></li>
              <li data-section="driversContract" data-value="req2"></li>
              <li data-section="driversContract" data-value="req3"></li>
              <li data-section="driversContract" data-value="req4"></li>
              <li data-section="driversContract" data-value="req5"></li>
            </ul>

            <h3 data-section="driversContract" data-value="obligationsTitle"></h3>
            <ul>
              <li data-section="driversContract" data-value="obl1"></li>
              <li data-section="driversContract" data-value="obl2"></li>
              <li data-section="driversContract" data-value="obl3"></li>
              <li data-section="driversContract" data-value="obl4"></li>
              <li data-section="driversContract" data-value="obl5"></li>
            </ul>
          </article>

          <article class="legal-card glass reveal" id="reglas">
            <span class="doc-label" data-section="rules" data-value="label"></span>
            <h2 data-section="rules" data-value="title"></h2>

            <h3 data-section="rules" data-value="principlesTitle"></h3>
            <ul>
              <li data-section="rules" data-value="principle1"></li>
              <li data-section="rules" data-value="principle2"></li>
              <li data-section="rules" data-value="principle3"></li>
              <li data-section="rules" data-value="principle4"></li>
              <li data-section="rules" data-value="principle5"></li>
            </ul>

            <h3 data-section="rules" data-value="userConductTitle"></h3>
            <ul>
              <li data-section="rules" data-value="user1"></li>
              <li data-section="rules" data-value="user2"></li>
              <li data-section="rules" data-value="user3"></li>
              <li data-section="rules" data-value="user4"></li>
              <li data-section="rules" data-value="user5"></li>
            </ul>

            <h3 data-section="rules" data-value="driverConductTitle"></h3>
            <ul>
              <li data-section="rules" data-value="driver1"></li>
              <li data-section="rules" data-value="driver2"></li>
              <li data-section="rules" data-value="driver3"></li>
              <li data-section="rules" data-value="driver4"></li>
              <li data-section="rules" data-value="driver5"></li>
            </ul>

            <h3 data-section="rules" data-value="prohibitedTitle"></h3>
            <ul>
              <li data-section="rules" data-value="prohibited1"></li>
              <li data-section="rules" data-value="prohibited2"></li>
              <li data-section="rules" data-value="prohibited3"></li>
              <li data-section="rules" data-value="prohibited4"></li>
              <li data-section="rules" data-value="prohibited5"></li>
            </ul>
          </article>

          <article class="legal-card glass reveal" id="politicas">
            <span class="doc-label" data-section="policies" data-value="label"></span>
            <h2 data-section="policies" data-value="title"></h2>

            <h3 data-section="policies" data-value="natureTitle"></h3>
            <p data-section="policies" data-value="natureText"></p>

            <h3 data-section="policies" data-value="paymentsTitle"></h3>
            <ul>
              <li data-section="policies" data-value="payment1"></li>
              <li data-section="policies" data-value="payment2"></li>
              <li data-section="policies" data-value="payment3"></li>
            </ul>

            <h3 data-section="policies" data-value="cancelTitle"></h3>
            <ul>
              <li data-section="policies" data-value="cancel1"></li>
              <li data-section="policies" data-value="cancel2"></li>
              <li data-section="policies" data-value="cancel3"></li>
              <li data-section="policies" data-value="cancel4"></li>
            </ul>

            <h3 data-section="policies" data-value="claimsTitle"></h3>
            <p data-section="policies" data-value="claimsText"></p>
          </article>

          <article class="legal-card glass reveal" id="privacidad">
            <span class="doc-label" data-section="privacy" data-value="label"></span>
            <h2 data-section="privacy" data-value="title"></h2>
            <p data-section="privacy" data-value="text"></p>
            <ul>
              <li data-section="privacy" data-value="item1"></li>
              <li data-section="privacy" data-value="item2"></li>
              <li data-section="privacy" data-value="item3"></li>
              <li data-section="privacy" data-value="item4"></li>
            </ul>
          </article>

          <article class="legal-card glass reveal" id="cookies">
            <span class="doc-label" data-section="cookies" data-value="label"></span>
            <h2 data-section="cookies" data-value="title"></h2>
            <p data-section="cookies" data-value="text1"></p>
            <p data-section="cookies" data-value="text2"></p>
          </article>

          <article class="legal-card glass reveal" id="aceptacion">
            <span class="doc-label" data-section="acceptance" data-value="label"></span>
            <h2 data-section="acceptance" data-value="title"></h2>
            <p data-section="acceptance" data-value="text"></p>
          </article>

          <article class="legal-card glass reveal" id="ley">
            <span class="doc-label" data-section="law" data-value="label"></span>
            <h2 data-section="law" data-value="title"></h2>
            <p data-section="law" data-value="text"></p>
          </article>

        </div>
      </div>
    </section>
  </main>

  <button class="back-to-top" id="backToTop" aria-label="Volver arriba">↑</button>

  <script src="legal.js"></script>
</body>
</html>
